services:
  - type: web
    name: locket-gold
    runtime: static
    buildCommand: echo "Locket Gold - static deploy"
    staticPublishPath: ./public
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin