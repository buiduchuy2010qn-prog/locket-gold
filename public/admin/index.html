<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Admin — Locket Gold</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="admin-login-wrap">
    <div class="admin-login-card">
      <div class="text-center mb-6">
        <div class="w-14 h-14 bg-gold rounded-2xl flex items-center justify-center text-black text-2xl font-bold mx-auto mb-3" style="background:#FFD700">L</div>
        <h1>Admin Panel</h1>
        <p class="text-sm text-zinc-500 mt-1">Locket Web <span class="gold" style="color:#FFD700">Gold Edition</span></p>
      </div>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="text-xs text-zinc-500 mb-1 block">Email</label>
          <input type="email" id="login-email" class="admin-input" placeholder="admin@email.com" autocomplete="username">
        </div>
        <div>
          <label class="text-xs text-zinc-500 mb-1 block">Mật khẩu</label>
          <input type="password" id="login-password" class="admin-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        <p id="login-error" class="admin-error hidden"></p>
        <button type="submit" class="admin-btn-gold">Đăng nhập Admin</button>
      </form>
      <a href="/" class="block text-center text-xs text-zinc-600 mt-4 hover:text-zinc-400">← Về Locket App</a>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="admin-app" class="admin-layout hidden">

    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo">
        <h2>Locket Admin</h2>
        <span>✦ GOLD EDITION</span>
      </div>
      <nav>
        <button type="button" class="admin-nav-btn active" data-panel="dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</button>
        <button type="button" class="admin-nav-btn" data-panel="users"><i class="fa-solid fa-users"></i> Users</button>
        <button type="button" class="admin-nav-btn" data-panel="lockets"><i class="fa-solid fa-images"></i> Lockets</button>
        <button type="button" class="admin-nav-btn" data-panel="gold"><i class="fa-solid fa-crown"></i> Gold</button>
        <button type="button" class="admin-nav-btn" data-panel="settings"><i class="fa-solid fa-gear"></i> Settings</button>
      </nav>
      <div class="mt-auto px-5 pt-4 border-t border-zinc-800" style="margin-top:auto;padding:16px 20px">
        <a href="/" class="admin-nav-btn" style="padding:8px 0"><i class="fa-solid fa-arrow-left"></i> Về App</a>
        <button type="button" id="btn-logout" class="admin-nav-btn text-red-400" style="padding:8px 0"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1 id="panel-title">Dashboard</h1>
        <div class="flex items-center gap-3 text-sm text-zinc-500">
          <span id="admin-user-email"></span>
          <span class="badge badge-gold">Admin</span>
        </div>
      </header>

      <div class="admin-content">

        <!-- Dashboard -->
        <div id="panel-dashboard" class="admin-panel active">
          <div id="stats-grid" class="stats-grid"></div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead><tr><th>Metric</th><th>Value</th><th>Status</th></tr></thead>
              <tbody id="dashboard-metrics"></tbody>
            </table>
          </div>
        </div>

        <!-- Users -->
        <div id="panel-users" class="admin-panel">
          <div class="flex justify-between items-center mb-4">
            <p class="text-sm text-zinc-500" id="users-count"></p>
          </div>
          <div class="admin-table-wrap overflow-x-auto">
            <table class="admin-table">
              <thead>
                <tr><th>User</th><th>Email</th><th>Gold</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
              </thead>
              <tbody id="users-table"></tbody>
            </table>
          </div>
        </div>

        <!-- Lockets -->
        <div id="panel-lockets" class="admin-panel">
          <p class="text-sm text-zinc-500 mb-4" id="lockets-count"></p>
          <div class="admin-table-wrap overflow-x-auto">
            <table class="admin-table">
              <thead>
                <tr><th>Preview</th><th>Type</th><th>Sender</th><th>Caption</th><th>Date</th><th>Actions</th></tr>
              </thead>
              <tbody id="lockets-table"></tbody>
            </table>
          </div>
        </div>

        <!-- Gold -->
        <div id="panel-gold" class="admin-panel">
          <p class="text-sm text-zinc-500 mb-4">Quản lý quyền Locket Gold</p>
          <div class="admin-table-wrap overflow-x-auto">
            <table class="admin-table">
              <thead>
                <tr><th>User</th><th>Email</th><th>Gold Status</th><th>Actions</th></tr>
              </thead>
              <tbody id="gold-table"></tbody>
            </table>
          </div>
        </div>

        <!-- Settings -->
        <div id="panel-settings" class="admin-panel">
          <div class="max-w-lg admin-settings-form">
            <div class="field">
              <label>Banner (hiển thị trên app)</label>
              <input type="text" id="setting-banner" class="admin-input">
            </div>
            <div class="field">
              <label>Thông báo hệ thống</label>
              <textarea id="setting-notification" class="admin-input admin-textarea"></textarea>
            </div>
            <button type="button" id="btn-save-settings" class="admin-btn-gold" style="width:auto;padding:12px 32px">Lưu Settings</button>
            <p id="settings-saved" class="text-green-500 text-sm mt-3 hidden">✓ Đã lưu!</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../js/state.js"></script>
  <script src="../js/auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
